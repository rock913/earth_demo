# Nginx reverse proxy for Streamlit (AlphaEarth)
# Debian/Ubuntu:
#   Copy to: /etc/nginx/sites-available/alphaearth
#   Then: ln -s /etc/nginx/sites-available/alphaearth /etc/nginx/sites-enabled/alphaearth
# RHEL-like (Alibaba Cloud Linux/CentOS/RHEL):
#   Copy to: /etc/nginx/conf.d/alphaearth.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_NAME;

    # Certbot will manage HTTPS config; keep 80 open for ACME.
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
